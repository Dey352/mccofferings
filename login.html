<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Malauli Christian Church</title>
    <meta name="description" content="Login to the MCC Offerings Management System.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: rgba(22, 22, 45, 0.95);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #6c63ff;
            --primary-light: #8b83ff;
            --primary-glow: rgba(108, 99, 255, 0.25);
            --border-radius: 10px;
            --border-radius-lg: 16px;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888a0;
            --border: rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 0.15;
            }

            90% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Login Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--border-radius-lg);
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo img {
            width: 80px;
            height: 80px;
            max-width: 80px;
            border-radius: 50%;
            margin-bottom: 14px;
            object-fit: contain;
            background: #fff;
            padding: 4px;
            display: inline-block;
        }

        .login-logo h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 6px;
            text-align: center;
            display: block;
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Error Message */
        .login-error {
            background: rgba(255, 71, 87, 0.12);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.25);
            border-radius: var(--border-radius);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .login-error.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Mobile */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 28px 20px;
            }

            .login-logo img {
                width: 64px;
                height: 64px;
                max-width: 64px;
            }

            .login-logo h2 {
                font-size: 20px;
            }

            .login-logo {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="login-card">
        <div class="login-logo">
            <img src="assets/mcclogo.jpg" alt="MCC Logo">
            <h2>Welcome Back</h2>
            <p>Malauli Christian Church</p>
        </div>
        <div class="login-error" id="loginError">Invalid username or password.</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUser"><i class="fas fa-user" style="margin-right:6px;"></i>Username</label>
                <input type="text" id="loginUser" required placeholder="Enter your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPass"><i class="fas fa-lock" style="margin-right:6px;"></i>Password</label>
                <input type="password" id="loginPass" required placeholder="Enter password"
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Sign
                In</button>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if (sessionStorage.getItem('mcc_auth') === 'true') {
            window.location.replace('index.html');
        }

        // Particles
        const c = document.getElementById('bgParticles');
        const colors = ['#6c63ff', '#00c9a7', '#ff6b9d', '#ffc107'];
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const sz = Math.random() * 6 + 2;
            p.style.cssText = `width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random() * 4)]};left:${Math.random() * 100}%;animation-duration:${Math.random() * 20 + 15}s;animation-delay:${Math.random() * 10}s;`;
            c.appendChild(p);
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const errEl = document.getElementById('loginError');

            if (user === 'MCC1975' && pass === 'mccadmin') {
                sessionStorage.setItem('mcc_auth', 'true');
                window.location.replace('index.html');
            } else {
                errEl.classList.add('show');
                setTimeout(() => errEl.classList.remove('show'), 3000);
            }
        });
    </script>
</body>

</html>
